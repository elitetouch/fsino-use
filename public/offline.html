<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#15a34a" />
  <title>You're offline · Farm Support Innovation</title>
  <style>
    :root {
      --green: #15a34a;
      --green-deep: #0f7c39;
      --bg: #fafdf8;
      --fg: #0b1410;
      --muted: #5b6b5f;
      --border: #e7ede3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 440px;
      width: 100%;
      background: white;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow: 0 30px 80px -30px rgba(15, 80, 30, 0.18);
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(160deg, var(--green) 0%, var(--green-deep) 100%);
      display: flex; align-items: center; justify-content: center;
      color: white;
    }
    h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.02em; }
    p  { font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0 0 24px; }
    button {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 999px;
      background: var(--green);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover  { background: var(--green-deep); }
    button:active { transform: scale(0.98); }
    .hint { margin-top: 16px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet right now — but your records are safe. Anything you log will sync the moment you're back online.</p>
    <button onclick="location.reload()">Try again</button>
    <p class="hint">FarmSpeak works offline once you've signed in. Your data is stored on this device.</p>
  </div>
</body>
</html>
